- name: Destroy DR Infra
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    # -----------------------------
    # Validate environment variable FIRST
    # (prevents accidental prod backup to non-prod buckets)
    # -----------------------------
    - name: Validate environment variable
      assert:
        that:
          - env is defined
          - env in ['dev', 'test', 'prod']
        fail_msg: "env variable is missing or invalid"

    - name: Show environment
      debug:
        msg: "Running in environment: {{ env }}"
        
    - name: Terraform Init (env-aware)
      command: >
        terraform init -reconfigure
        -backend-config="bucket={{ 'dr-terraform-state-storage' if env == 'prod' else 'dr-terraform-state-storage-test' }}"
        -backend-config="key=dr-infra/terraform.tfstate"
        -backend-config="region=ap-south-1"
        -backend-config="dynamodb_table=terraform-lock"
      args:
        chdir: "./terraform"

    - name: Terraform Destroy
      command: >
        terraform destroy -auto-approve
        -var="environment={{ env }}"
      args:
        chdir: "./terraform"
      environment:
        TF_IN_AUTOMATION: "true"
        TF_INPUT: "false"

    - name: Show destroy result
      debug:
        msg: "Infrastructure destroyed successfully"