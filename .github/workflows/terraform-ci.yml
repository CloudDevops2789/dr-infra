name: Terraform CI (DEV)

on:
  pull_request:
    branches:
      - development
  push:
    branches:
      - development

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-dev:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (DEV)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (S3 backend + locking)
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=dr-terraform-state-storage-test" \
            -backend-config="key=dr-infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-lock"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (capture output)
        id: plan
        run: |
          terraform plan -no-color -var="environment=dev" > plan.txt
          cat plan.txt

      - name: Upload Plan Artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');

            const maxLength = 65000;
            const trimmedPlan = plan.length > maxLength 
              ? plan.substring(0, maxLength) + "\n\n...output truncated..."
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### Terraform Plan Output\n\n```\n" + trimmedPlan + "\n```"
            });