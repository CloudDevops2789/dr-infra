name: Terraform CI (DEV and PROD)

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-dev:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS Credentials (DEV)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (S3 backend + locking)
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=dr-terraform-state-storage-test" \
            -backend-config="key=dr-infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-lock"

      - name: Terraform Format Check
        run: |
          echo "---- TERRAFORM FORMAT CHECK ----"
          terraform fmt -check -recursive || (echo "Formatting issues detected"; exit 1)
          echo "Formatting OK"

      - name: Terraform Validate
        run: |
          echo "---- TERRAFORM VALIDATE ----"
          terraform validate

      - name: Terraform Plan (clean output)
        id: plan
        run: |
          echo "---- TERRAFORM PLAN ----"

          terraform plan -no-color -out=tfplan -var="environment=dev"

          terraform show -json tfplan > plan.json

          echo "---- RESOURCE CHANGES ----" > plan-summary.txt

          cat plan.json | jq -r '
            .resource_changes[] |
            .change.actions as $a |
            if ($a | index("create")) then "+ " + .type
            elif ($a | index("update")) then "~ " + .type
            elif ($a | index("delete")) then "- " + .type
            else empty end
          ' | sort | uniq >> plan-summary.txt

          echo "" >> plan-summary.txt
          echo "---- SUMMARY ----" >> plan-summary.txt

          terraform show -no-color tfplan | grep "Plan:" >> plan-summary.txt

          cat plan-summary.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan-summary.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan-summary.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### Terraform Plan (Summary)\n\n```\n" + plan + "\n```"
            });